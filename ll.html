<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>蒋粑我厉不厉害</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Microsoft YaHei", sans-serif;
            overflow: hidden;
            position: relative;
        }

        .float-box {
            position: absolute;
            width: 40px;
            height: 40px;
            background: rgba(173, 216, 230, 0.3);
            border-radius: 6px;
            animation: float 6s ease-in-out infinite;
            z-index: 1;
        }

        @keyframes float {
            0%   { transform: translateY(0px) rotate(0deg); opacity: 0.6; }
            50%  { transform: translateY(-80px) rotate(180deg); opacity: 0.9; }
            100% { transform: translateY(0px) rotate(360deg); opacity: 0.6; }
        }

        .wrapper {
            z-index: 999;
            text-align: center;
        }

        .text-box {
            font-size: 80px;
            font-weight: bold;
            color: #89CFF0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            letter-spacing: 8px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .char {
            display: inline-block;
            opacity: 0;
            transform: translateY(-30px) scale(0.4) rotate(-15deg);
            animation: pop 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.6) forwards;
        }

        @keyframes pop {
            to {
                opacity: 1;
                transform: translateY(0) scale(1) rotate(0);
            }
        }
    </style>
</head>
<body>

<div class="float-box" style="top:10%;left:10%;animation-delay:0s"></div>
<div class="float-box" style="top:20%;left:30%;animation-delay:1s;width:25px;height:25px"></div>
<div class="float-box" style="top:80%;left:20%;animation-delay:2s;width:50px;height:50px"></div>
<div class="float-box" style="top:60%;left:80%;animation-delay:0.5s"></div>
<div class="float-box" style="top:30%;left:60%;animation-delay:1.5s;width:30px;height:30px"></div>
<div class="float-box" style="top:70%;left:40%;animation-delay:2.5s"></div>
<div class="float-box" style="top:5%;left:90%;animation-delay:3s"></div>

<div class="wrapper">
    <div class="text-box" id="line1"></div>
    <div class="text-box" id="line2"></div>
</div>

<script>
    const line1 = "蒋粑";
    const line2 = "我厉不厉害";

    const container1 = document.getElementById("line1");
    const container2 = document.getElementById("line2");

    [...line1].forEach((char, i) => {
        const span = document.createElement("span");
        span.className = "char";
        span.textContent = char;
        span.style.animationDelay = `${i * 0.25}s`;
        container1.appendChild(span);
    });

    [...line2].forEach((char, i) => {
        const span = document.createElement("span");
        span.className = "char";
        span.textContent = char;
        span.style.animationDelay = `${1 + i * 0.25}s`;
        container2.appendChild(span);
    });
</script>

</body>
</html>
