<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Thank You</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background-color: #fff9fc;
      display: grid;
      place-items: center;
      font-family: Georgia, 'Times New Roman', Times, serif;
      position: relative;
    }

    /* 优雅英文字体（美体） */
    .thank-you {
      font-size: min(16vw, 180px);
      font-style: italic;
      font-weight: 500;
      color: #ff7b9c;
      letter-spacing: 0.05em;
      z-index: 10;
      user-select: none;
      text-shadow: 0 0 12px rgba(255, 123, 156, 0.15);
    }

    #hearts {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .heart {
      position: absolute;
      background-color: #ffccd5;
      transform: rotate(45deg);
      animation: float 8s linear infinite;
      opacity: 0.6;
    }

    .heart::before,
    .heart::after {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background-color: inherit;
      border-radius: 50%;
    }

    .heart::before { top: -50%; left: 0; }
    .heart::after { left: -50%; top: 0; }

    @keyframes float {
      0% {
        transform: rotate(45deg) translate(0, 110vh) scale(0.8);
        opacity: 0;
      }
      10% { opacity: 0.6; }
      90% { opacity: 0.5; }
      100% {
        transform: rotate(45deg) translate(var(--tx), -110vh) scale(var(--scale));
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div id="hearts"></div>
  <h1 class="thank-you">thankyou</h1>

  <script>
    const container = document.getElementById('hearts');
    const used = new Set();

    function getSafePos() {
      let gx, gy, key;
      for (let i = 0; i < 25; i++) {
        gx = Math.floor(Math.random() * 12);
        gy = Math.floor(Math.random() * 12);
        key = gx + "," + gy;
        if (!used.has(key)) {
          used.add(key);
          setTimeout(() => used.delete(key), 8000);
          return { x: gx * 8.33, y: gy * 8.33 };
        }
      }
      return { x: Math.random() * 100, y: Math.random() * 100 };
    }

    function createHeart() {
      const p = getSafePos();
      // 避开文字中心
      if (Math.abs(p.x - 50) < 34 && Math.abs(p.y - 50) < 24) return;

      const h = document.createElement('div');
      h.className = 'heart';

      const size = Math.random() * 14 + 10;
      const tx = (Math.random() - 0.5) * 140;
      const scale = (Math.random() * 0.4 + 0.8).toFixed(2);
      const dur = Math.random() * 3 + 6;

      h.style.width = h.style.height = size + 'px';
      h.style.left = p.x + '%';
      h.style.top = p.y + '%';
      h.style.setProperty('--tx', tx + 'px');
      h.style.setProperty('--scale', scale);
      h.style.animationDuration = dur + 's';
      h.style.animationDelay = Math.random() * 2 + 's';

      container.appendChild(h);
      setTimeout(() => h.remove(), dur * 1000);
    }

    setInterval(createHeart, 320);
  </script>
</body>
</html>
