<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>to 灿</title>
  <style>
    /* 整体页面设置 */
    body {
      /* 可爱字体设置：优先华康少女体，无则用系统圆润字体 */
      font-family: "华康少女体", "Comic Sans MS", "Marker Felt", "Arial Rounded MT Bold", sans-serif;
      background: url('https://img1.baidu.com/it/u=1033380183,2868323625&fm=253&fmt=auto&app=138&f=JPEG?w=1280&h=853') no-repeat center center fixed;
      background-size: cover;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      overflow-x: hidden; /* 隐藏横向滚动条 */
    }

    /* 信纸容器改为可滚动 */
    .letter-container {
      max-width: 800px;
      margin: 30px auto; /* 上下边距固定，左右居中 */
      padding: 40px;
      background-color: rgba(255, 255, 255, 0.8);
      border-radius: 15px;
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 255, 255, 0.18);
      animation: fadeIn 1.5s ease-in-out;
      
      /* 关键修改：设置滚动容器 */
      min-height: 90vh; /* 确保容器高度接近屏幕，方便滑动 */
      overflow-y: auto; /* 垂直方向可滚动 */
      scrollbar-width: thin; /* 窄滚动条 */
      scrollbar-color: #8e24aa transparent; /* 滚动条颜色 */
    }

    /* 滚动条美化（Webkit内核浏览器） */
    .letter-container::-webkit-scrollbar {
      width: 8px; /* 滚动条宽度 */
    }
    .letter-container::-webkit-scrollbar-track {
      background: transparent; /* 轨道透明 */
    }
    .letter-container::-webkit-scrollbar-thumb {
      background-color: #8e24aa; /* 滚动条颜色 */
      border-radius: 4px; /* 圆角 */
    }

    h1 {
      color: #8e24aa;
      text-align: center;
      margin-bottom: 30px;
      font-size: 2.2em;
    }

    p {
      color: #424242;
      font-size: 1.1em;
      letter-spacing: 0.8px;
      margin-bottom: 25px; /* 段落间距加大，方便阅读 */
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>
  <div class="letter-container">
    <h1>  </h1>
    <p>呆蛋邝灿吃屁</p >
    <!-- 增加空段落，方便测试滚动效果 -->
    <p></p ><p></p ><p></p ><p></p ><p></p >
  </div>
</body>

</html>
